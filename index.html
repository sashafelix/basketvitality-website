<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Basket Vitality</title>
<meta name="description" content="Basket Vitality — smarter baskets, healthier choices. Privacy-first receipt and grocery insight for Android.">
<meta name="theme-color" content="#F6F2DE">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  @font-face { font-family:"Fraunces"; src:url("/fonts/fraunces_regular.ttf") format("truetype"); font-weight:400; font-style:normal; font-display:swap; }
  @font-face { font-family:"Fraunces"; src:url("/fonts/fraunces_italic.ttf") format("truetype"); font-weight:400; font-style:italic; font-display:swap; }
  @font-face { font-family:"Geist Mono"; src:url("/fonts/geist_mono_medium.ttf") format("truetype"); font-weight:500; font-style:normal; font-display:swap; }
  :root { --gold:#DAB041; --ivory:#F6F2DE; --ink:#1B2A21; --emerald:#057331; --forest:#054B16; --ink-muted:#767F7A; }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
    background:var(--ivory); color:var(--ink); text-align:center;
    font-family:"Geist Mono", ui-monospace, monospace;
  }
  .icon { width:96px; height:96px; border-radius:22px; box-shadow:0 6px 24px rgba(27,42,33,0.12); }
  .wm { font-family:"Fraunces", Georgia, serif; font-size:2.2rem; color:var(--ink); margin:20px 0 4px; letter-spacing:-0.015em; }
  .wm em { font-style:italic; color:var(--gold); }
  .tag { font-size:0.72rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-muted); margin:0 0 26px; }
  a { color:var(--emerald); font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase; text-underline-offset:3px; }
  a:hover { color:var(--forest); }
  :root { color-scheme: light; }
</style>
</head>
<body>
  <div>
    <img class="icon" src="/icon-512.png" alt="Basket Vitality app icon" width="96" height="96">
    <p class="wm">Basket <em>Vitality</em></p>
    <p class="tag">Smarter baskets · Healthier choices</p>
    <p><a href="/privacy/">Privacy Policy</a></p>
  </div>
</body>
</html>
